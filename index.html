<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香蕉 AI · NanoBanana2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --primary: #f59e0b;
      --primary-light: #fbbf24;
      --bg: #0a0a0f;
      --card: rgba(20, 20, 35, 0.85);
      --text: #f8f9fa;
      --text-light: #a0a0c0;
      --border: rgba(245, 158, 11, 0.25);
      --glass: rgba(255,255,255,0.06);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121f 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 全局玻璃摩卡 + 高级感 */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px -15px rgba(0,0,0,0.6);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 2.1rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -1px;
    }

    .logo i { font-size: 2.4rem; }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      font-weight: 500;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      transition: color .3s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--primary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), #d97706);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #000;
    }

    /* 主内容区 - 极简高级布局 */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
    }

    /* 侧边栏 */
    .sidebar {
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    .sidebar-card {
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--primary);
      letter-spacing: 0.5px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      margin-bottom: 6px;
      color: var(--text-light);
      cursor: pointer;
      transition: all .3s;
    }

    .menu-item:hover, .menu-item.active {
      background: rgba(245,158,11,0.1);
      color: var(--primary);
    }

    /* 内容区 */
    .content {
      min-height: 80vh;
    }

    .hero {
      text-align: center;
      padding: 6rem 2rem 4rem;
      background: linear-gradient(180deg, rgba(245,158,11,0.08) 0%, transparent 70%);
      border-radius: 28px;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 3.8rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.35rem;
      color: var(--text-light);
      max-width: 620px;
      margin: 0 auto 2.5rem;
    }

    /* 生成卡片 */
    .generate-card {
      padding: 3rem;
    }

    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 6px;
      width: fit-content;
      margin-bottom: 2rem;
    }

    .tab {
      padding: 12px 28px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
    }

    .tab.active {
      background: var(--primary);
      color: #000;
      box-shadow: 0 4px 15px rgba(245,158,11,0.4);
    }

    .prompt-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.8rem;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.05rem;
      resize: none;
    }

    .size-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 1rem;
    }

    .size-btn {
      padding: 1rem;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all .3s;
    }

    .size-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      transform: scale(1.03);
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 4rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all .3s;
    }

    .upload-zone:hover {
      border-color: var(--primary);
      background: rgba(245,158,11,0.05);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .preview-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-item img {
      width: 100%;
      height: 110px;
      object-fit: cover;
    }

    .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .generate-btn {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(90deg, var(--primary-light), var(--primary));
      color: #000;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      margin-top: 2rem;
      transition: all .4s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .generate-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(245,158,11,0.35);
    }

    /* 结果区 */
    .result-card {
      margin-top: 3rem;
      padding: 2rem;
      text-align: center;
    }

    .result-card img {
      max-width: 100%;
      border-radius: 20px;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7);
      margin-bottom: 1.5rem;
    }

    /* 历史记录 */
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .history-item {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      transition: transform .3s;
    }

    .history-item:hover {
      transform: translateY(-8px);
    }

    .history-item img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .history-info {
      padding: 1.25rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 1rem 2rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.85);
      color: white;
      z-index: 9999;
      opacity: 0;
      transition: all .4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }

    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">
      <i class="fas fa-banana"></i>
      香蕉 AI
    </div>
    <div class="nav-links">
      <a href="#" class="active">创作</a>
      <a href="#" onclick="showSection('history')">历史</a>
    </div>
    <div class="user-info" id="userArea" style="display:none;">
      <div class="avatar" id="avatar">A</div>
      <div>
        <div style="font-weight:600;" id="userEmail">user@banana.ai</div>
        <div style="font-size:0.85rem;color:var(--text-light);">已登录</div>
      </div>
      <button onclick="logout()" style="margin-left:1.5rem;background:transparent;border:1px solid #ef4444;color:#ef4444;padding:8px 20px;border-radius:999px;cursor:pointer;">退出</button>
    </div>
    <div id="guestArea">
      <button onclick="showLoginModal()" style="margin-right:12px;background:transparent;border:1px solid var(--primary);color:var(--primary);padding:10px 24px;border-radius:999px;cursor:pointer;">登录</button>
      <button onclick="showRegisterModal()" style="background:var(--primary);color:#000;padding:10px 28px;border-radius:999px;border:none;font-weight:700;cursor:pointer;">注册</button>
    </div>
  </div>
</header>

<div class="main">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="glass sidebar-card">
      <div class="sidebar-title"><i class="fas fa-magic"></i> 创作中心</div>
      <div onclick="switchTab(0)" class="menu-item active" id="tab0"><i class="fas fa-text-height"></i> 文生图</div>
      <div onclick="switchTab(1)" class="menu-item" id="tab1"><i class="fas fa-image"></i> 图生图</div>
      <div onclick="switchTab(2)" class="menu-item" id="tab2"><i class="fas fa-images"></i> 多图参考</div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="content">
    <!-- 英雄区 -->
    <div class="hero glass">
      <h1>让创意<br>瞬间成画</h1>
      <p>调用顶级香蕉 API（nano-banana-2）<br>专业级图像生成 · 零门槛使用</p>
    </div>

    <!-- 生成卡片 -->
    <div class="glass generate-card">
      <div class="tabs">
        <div class="tab active" id="tabText">文生图</div>
        <div class="tab" id="tabImg2Img">图生图</div>
        <div class="tab" id="tabMulti">多图参考</div>
      </div>

      <form id="generateForm">
        <div class="prompt-box">
          <textarea id="prompt" placeholder="一只穿着宇航服的香蕉在赛博城市夜空飞行，极致细节，电影级光影，8K..." required></textarea>
        </div>

        <label style="display:block;margin:1.5rem 0 0.8rem;color:var(--text-light);">尺寸选择</label>
        <div class="size-grid" id="sizeGrid">
          <!-- JS 动态填充 -->
        </div>

        <!-- 上传区域 -->
        <div id="uploadArea" style="display:none;margin-top:2rem;">
          <label style="display:block;margin-bottom:0.8rem;color:var(--text-light);">上传参考图（最多 4 张）</label>
          <div id="dropZone" class="upload-zone glass">
            <i class="fas fa-cloud-upload-alt" style="font-size:3.5rem;margin-bottom:1rem;color:var(--text-light);"></i>
            <p>点击或拖拽图片到此处</p>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
          </div>
          <div id="previewContainer" class="preview-grid"></div>
        </div>

        <button type="submit" class="generate-btn" id="generateBtn">
          <i class="fas fa-sparkles"></i>
          开始生成
        </button>
      </form>

      <!-- 生成结果 -->
      <div id="resultArea" class="result-card hidden">
        <img id="resultImg" alt="生成结果">
        <p id="resultPrompt" style="margin-top:1rem;color:var(--text-light);font-size:1.05rem;"></p>
      </div>
    </div>

    <!-- 历史记录 -->
    <div id="historySection" style="display:none;">
      <h2 style="margin:3rem 0 1.5rem;font-size:1.8rem;">创作历史</h2>
      <div id="historyGrid" class="history-grid"></div>
    </div>
  </div>
</div>

<!-- 登录 / 注册模态 -->
<div id="authModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:9999;">
  <div class="glass" style="width:100%;max-width:420px;padding:3rem;border-radius:24px;position:relative;">
    <span onclick="closeModal()" style="position:absolute;top:1.5rem;right:1.5rem;font-size:2rem;cursor:pointer;color:var(--text-light);">×</span>
    <h2 id="modalTitle" style="text-align:center;margin-bottom:2rem;font-size:2rem;">登录账号</h2>
    
    <form id="authForm">
      <input type="email" id="email" placeholder="邮箱地址" required style="margin-bottom:1rem;">
      <input type="password" id="password" placeholder="密码" required>
      <button type="submit" id="authSubmitBtn" style="margin-top:1.5rem;width:100%;padding:1rem;background:var(--primary);color:#000;font-weight:700;border:none;border-radius:14px;cursor:pointer;">登录</button>
    </form>
    
    <p style="text-align:center;margin-top:1.8rem;color:var(--text-light);">
      <span id="switchLink">还没有账号？<a href="#" onclick="toggleAuthMode();return false;" style="color:var(--primary);">立即注册</a></span>
    </p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  // ==================== 全局变量 ====================
  let currentUser = null;
  let currentTab = 0;           // 0:文生图 1:图生图 2:多图参考
  let uploadedFiles = [];

  const API = {
    register: '/api/auth/register',
    login: '/api/auth/login',
    logout: '/api/logout',
    user: '/api/user',
    providers: '/api/providers',
    generate: '/api/generate',
    img2img: '/api/img2img',
    multiRef: '/api/multi-ref',
    history: '/api/history'
  };

  // ==================== Toast ====================
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3800);
  }

  // ==================== 模态 ====================
  let isLoginMode = true;
  function showModal(isLogin) {
    isLoginMode = isLogin;
    document.getElementById('modalTitle').textContent = isLogin ? '登录账号' : '创建账号';
    document.getElementById('authSubmitBtn').textContent = isLogin ? '登录' : '注册';
    document.getElementById('authModal').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('authModal').style.display = 'none';
  }
  function toggleAuthMode() {
    showModal(!isLoginMode);
  }

  // ==================== 认证 ====================
  async function authSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const endpoint = isLoginMode ? API.login : API.register;

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || '操作失败');

      showToast(isLoginMode ? '登录成功' : '注册成功！请登录');
      closeModal();

      if (isLoginMode) {
        currentUser = { email };
        document.getElementById('guestArea').style.display = 'none';
        document.getElementById('userArea').style.display = 'flex';
        document.getElementById('userEmail').textContent = email;
        loadHistory();
      }
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function logout() {
    await fetch(API.logout);
    currentUser = null;
    document.getElementById('guestArea').style.display = 'block';
    document.getElementById('userArea').style.display = 'none';
    showToast('已退出登录');
  }

  // ==================== Tab 切换 ====================
  function switchTab(n) {
    currentTab = n;
    document.querySelectorAll('.menu-item').forEach((el,i) => el.classList.toggle('active', i===n));
    document.getElementById('uploadArea').style.display = (n === 0) ? 'none' : 'block';
  }

  // ==================== 生成 ====================
  document.getElementById('generateForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!currentUser) {
      showModal(true);
      return;
    }

    const btn = document.getElementById('generateBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '生成中 <i class="fas fa-spinner fa-spin"></i>';
    btn.disabled = true;

    const prompt = document.getElementById('prompt').value.trim();
    const size = document.querySelector('.size-btn.active').dataset.size;

    const formData = new FormData();
    formData.append('prompt', prompt);
    formData.append('size', size);

    let endpoint = API.generate;

    if (currentTab === 1) {
      endpoint = API.img2img;
      uploadedFiles.forEach(f => formData.append('image', f));
    } else if (currentTab === 2) {
      endpoint = API.multiRef;
      uploadedFiles.forEach(f => formData.append('images', f));
    }

    try {
      const res = await fetch(endpoint, { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || '生成失败');

      document.getElementById('resultImg').src = data.image_url || data.imageUrl;
      document.getElementById('resultPrompt').textContent = prompt;
      document.getElementById('resultArea').classList.remove('hidden');
      showToast('生成成功！', 'success');

      setTimeout(loadHistory, 800);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  });

  // ==================== 历史记录 ====================
  async function loadHistory() {
    if (!currentUser) return;
    try {
      const res = await fetch(API.history + '?page=1&limit=12');
      const list = await res.json();
      const grid = document.getElementById('historyGrid');
      grid.innerHTML = '';

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item glass';
        div.innerHTML = `
          <img src="${item.image_url}" alt="">
          <div class="history-info">
            <div style="font-size:0.95rem;margin-bottom:0.6rem;color:var(--text-light);">${item.prompt.substring(0,65)}${item.prompt.length>65?'...':''}</div>
            <small>${new Date(item.created_at).toLocaleString('zh-CN')}</small>
            <button onclick="deleteHistory(${item.id});event.stopImmediatePropagation()" style="margin-top:1rem;background:#ef4444;color:white;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;">删除</button>
          </div>
        `;
        grid.appendChild(div);
      });
    } catch(e) {}
  }

  window.deleteHistory = async (id) => {
    if (!confirm('确定删除？')) return;
    await fetch(`${API.history}/${id}`, { method: 'DELETE' });
    loadHistory();
  };

  // ==================== 文件上传 ====================
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    uploadedFiles = Array.from(files).slice(0,4);
    const container = document.getElementById('previewContainer');
    container.innerHTML = '';

    uploadedFiles.forEach((file, i) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <img src="${ev.target.result}">
          <div class="remove-btn" onclick="removePreview(${i});event.stopImmediatePropagation()">×</div>
        `;
        container.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  }

  window.removePreview = (i) => {
    uploadedFiles.splice(i,1);
    handleFiles(uploadedFiles);
  };

  // ==================== 尺寸按钮 ====================
  function createSizeButtons() {
    const sizes = [
      {s:'512x512',t:'小'},
      {s:'768x768',t:'中'},
      {s:'1024x1024',t:'标准'},
      {s:'1024x1536',t:'竖版'},
      {s:'1536x1024',t:'横版'}
    ];
    const grid = document.getElementById('sizeGrid');
    grid.innerHTML = '';
    sizes.forEach((item,i) => {
      const btn = document.createElement('div');
      btn.className = `size-btn ${i===2?'active':''}`;
      btn.dataset.size = item.s;
      btn.textContent = `${item.s} ${item.t}`;
      btn.onclick = () => {
        document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      };
      grid.appendChild(btn);
    });
  }

  // ==================== 初始化 ====================
  document.addEventListener('DOMContentLoaded', () => {
    createSizeButtons();

    // 绑定认证表单
    document.getElementById('authForm').addEventListener('submit', authSubmit);

    // 检查是否已登录
    fetch(API.user).then(r => {
      if (r.ok) {
        r.json().then(user => {
          currentUser = user;
          document.getElementById('guestArea').style.display = 'none';
          document.getElementById('userArea').style.display = 'flex';
          document.getElementById('userEmail').textContent = user.email;
          loadHistory();
        });
      }
    }).catch(()=>{});

    // Tab 点击
    document.querySelectorAll('.tab').forEach((tab,i) => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = i;
        document.getElementById('uploadArea').style.display = (i===0) ? 'none' : 'block';
      };
    });

    // 拖拽上传
    dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.style.borderColor='#fbbf24';});
    dropZone.addEventListener('dragleave', ()=>{dropZone.style.borderColor='var(--border)';});
    dropZone.addEventListener('drop', e=>{
      e.preventDefault();
      dropZone.style.borderColor='var(--border)';
      handleFiles(e.dataTransfer.files);
    });

    // 默认显示文生图
    document.getElementById('uploadArea').style.display = 'none';
  });

  // 全局暴露给 onclick
  window.showLoginModal = () => showModal(true);
  window.showRegisterModal = () => showModal(false);
  window.closeModal = closeModal;
  window.toggleAuthMode = toggleAuthMode;
  window.logout = logout;
  window.showSection = (sec) => {
    document.getElementById('historySection').style.display = (sec==='history') ? 'block' : 'none';
  };
</script>
</body>
</html>
