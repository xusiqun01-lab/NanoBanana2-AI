<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香蕉 AI - 调试版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
    :root {
        --primary: #f59e0b;
        --danger: #ef4444;
        --success: #22c55e;
        --bg-dark: #0a0a0a;
        --bg-card: #141414;
        --border-glass: rgba(255,255,255,0.1);
        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }

    /* 调试面板（关键新增） */
    .debug-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 400px;
        max-height: 300px;
        background: rgba(20,20,20,0.95);
        border: 1px solid var(--border-glass);
        border-radius: 8px;
        padding: 16px;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        overflow-y: auto;
        z-index: 9999;
        display: none;
    }

    .debug-panel.active { display: block; }

    .debug-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-glass);
    }

    .debug-log {
        margin-bottom: 8px;
        padding: 8px;
        background: rgba(0,0,0,0.3);
        border-radius: 4px;
        border-left: 3px solid var(--primary);
    }

    .debug-log.error { border-left-color: var(--danger); }
    .debug-log.success { border-left-color: var(--success); }

    .debug-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background: var(--bg-card);
        border: 1px solid var(--border-glass);
        border-radius: 50%;
        color: var(--text-secondary);
        cursor: pointer;
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 布局（与之前类似，精简版） */
    .app-container { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border-glass); padding: 24px 20px; }
    .nav-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; }
    .nav-item.active { background: rgba(245,158,11,0.15); color: var(--primary); }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-header { height: 64px; background: var(--bg-card); border-bottom: 1px solid var(--border-glass); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
    .content-area { flex: 1; overflow: auto; padding: 24px; }

    /* 生成布局 */
    .generate-layout { display: grid; grid-template-columns: 480px 1fr; gap: 24px; height: 100%; max-width: 1400px; margin: 0 auto; }
    .panel { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border-glass); font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .panel-body { flex: 1; overflow-y: auto; padding: 24px; }

    /* 输入样式 */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); font-weight: 500; }
    .form-input, .prompt-input { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary); font-size: 15px; outline: none; }
    .prompt-input { min-height: 120px; resize: vertical; font-family: inherit; }
    .prompt-input:focus { border-color: var(--primary); }

    /* 按钮 */
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #d97706); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass); color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }

    /* 上传区 */
    .upload-zone { border: 2px dashed var(--border-glass); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; background: rgba(0,0,0,0.2); min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .upload-zone:hover { border-color: var(--primary); background: rgba(245,158,11,0.05); }
    .upload-zone.dragover { border-color: var(--primary); background: rgba(245,158,11,0.1); transform: scale(1.02); }
    .file-input { display: none; }

    /* 结果区 */
    .result-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; background: rgba(0,0,0,0.2); border-radius: 8px; position: relative; padding: 20px; }
    .result-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); padding: 20px; border-radius: 8px; color: #f87171; max-width: 100%; overflow-wrap: break-word; }
    .error-box pre { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 4px; font-size: 11px; overflow-x: auto; white-space: pre-wrap; }

    /* 测试按钮 */
    .test-btn { padding: 6px 12px; background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 10px; }
    .test-btn:hover { background: rgba(59,130,246,0.3); }

    .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 调试面板 -->
    <div class="debug-toggle" onclick="toggleDebug()" title="调试日志">
        <i class="fas fa-bug"></i>
    </div>
    <div class="debug-panel" id="debugPanel">
        <div class="debug-header">
            <strong>调试日志</strong>
            <button onclick="clearDebug()" style="background:none;border:none;color:#666;cursor:pointer;"><i class="fas fa-trash"></i></button>
        </div>
        <div id="debugLogs"></div>
    </div>

    <div id="appContainer" class="app-container">
        <aside class="sidebar">
            <div style="margin-bottom: 32px; font-size: 20px; font-weight: 700;">
                🍌 香蕉 AI
            </div>
            <nav>
                <div class="nav-item active" onclick="navigate('text2img')">
                    <i class="fas fa-pen-nib"></i> 文生图
                </div>
                <div class="nav-item" onclick="navigate('img2img')">
                    <i class="fas fa-image"></i> 图生图
                </div>
                <div class="nav-item" onclick="navigate('settings')">
                    <i class="fas fa-cog"></i> API设置
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="pageTitle">文生图</h1>
                <div>
                    <span id="userName" style="margin-right: 16px;">user</span>
                    <button onclick="logout()" style="background:none;border:none;color:#fff;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="content-area">
                <!-- 文生图页面 -->
                <div id="page-text2img" class="page">
                    <div class="generate-layout">
                        <div class="panel">
                            <div class="panel-header">
                                <i class="fas fa-sliders-h"></i> 参数设置
                            </div>
                            <div class="panel-body">
                                <div class="form-group">
                                    <label class="form-label">提示词</label>
                                    <textarea id="t2iPrompt" class="prompt-input" placeholder="描述你想要的画面..."></textarea>
                                </div>
                                <button class="btn-primary" id="t2iBtn" onclick="generateText2Img()">
                                    <i class="fas fa-magic"></i> 生成图像
                                </button>
                            </div>
                        </div>
                        <div class="panel">
                            <div class="panel-header">
                                <i class="fas fa-eye"></i> 结果
                            </div>
                            <div class="panel-body">
                                <div id="t2iResult" class="result-area">
                                    <p style="color: var(--text-secondary);">生成结果将显示在这里</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 图生图页面 -->
                <div id="page-img2img" class="page hidden">
                    <div class="generate-layout">
                        <div class="panel">
                            <div class="panel-header">
                                <i class="fas fa-sliders-h"></i> 上传与设置
                            </div>
                            <div class="panel-body">
                                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imgFile').click()">
                                    <i class="fas fa-cloud-upload-alt" style="font-size: 48px; margin-bottom: 16px; color: var(--text-muted);"></i>
                                    <div style="color: var(--text-secondary); margin-bottom: 8px;">点击或拖拽上传图片</div>
                                    <div style="font-size: 13px; color: var(--text-muted);">支持 JPG、PNG，自动转Base64</div>
                                    <input type="file" id="imgFile" class="file-input" accept="image/*" onchange="handleImageUpload(event)">
                                </div>
                                <div id="imgPreview" style="margin-top: 16px;"></div>
                                
                                <div class="form-group" style="margin-top: 20px;">
                                    <label class="form-label">转换描述</label>
                                    <textarea id="imgPrompt" class="prompt-input" placeholder="描述如何修改..."></textarea>
                                </div>
                                <button class="btn-primary" id="imgBtn" onclick="generateImg2Img()" disabled>
                                    <i class="fas fa-magic"></i> 开始转换
                                </button>
                            </div>
                        </div>
                        <div class="panel">
                            <div class="panel-header">
                                <i class="fas fa-eye"></i> 转换结果
                            </div>
                            <div class="panel-body">
                                <div id="imgResult" class="result-area">
                                    <p style="color: var(--text-secondary);">转换结果将显示在这里</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- API设置页面（带测试功能） -->
                <div id="page-settings" class="page hidden">
                    <div class="panel" style="max-width: 600px;">
                        <div class="panel-header">
                            <i class="fas fa-cog"></i> API配置
                        </div>
                        <div class="panel-body">
                            <div class="form-group">
                                <label class="form-label">配置名称</label>
                                <input type="text" id="apiName" class="form-input" placeholder="我的API">
                            </div>
                            <div class="form-group">
                                <label class="form-label">API URL 
                                    <button class="test-btn" onclick="testConnection()">测试连接</button>
                                </label>
                                <input type="text" id="apiUrl" class="form-input" placeholder="https://api.example.com/v1/images/generations">
                                <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">
                                    提示：通常是 <code>https://xxx.com/v1/images/generations</code>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">API Key</label>
                                <input type="password" id="apiKey" class="form-input" placeholder="sk-...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">模型</label>
                                <input type="text" id="apiModel" class="form-input" placeholder="dall-e-3" value="dall-e-3">
                            </div>
                            <button class="btn-primary" onclick="saveApi()">保存配置</button>
                            
                            <div id="testResult" style="margin-top: 20px; display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    // 调试日志系统
    function log(type, message, data) {
        const logs = document.getElementById('debugLogs');
        const entry = document.createElement('div');
        entry.className = `debug-log ${type}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<strong>[${time}]</strong> ${message}`;
        if (data) {
            entry.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
        console.log(`[${type}]`, message, data);
    }

    function toggleDebug() {
        document.getElementById('debugPanel').classList.toggle('active');
    }

    function clearDebug() {
        document.getElementById('debugLogs').innerHTML = '';
    }

    // 状态
    let currentImage = null;
    let apiConfig = null;

    // 检查登录
    async function init() {
        try {
            const res = await fetch('/api/user', { credentials: 'include' });
            if (res.ok) {
                const user = await res.json();
                document.getElementById('userName').textContent = user.email;
                loadApiConfig();
            } else {
                window.location.href = '/login.html'; // 简化处理，实际应有登录页
            }
        } catch (e) {
            log('error', '初始化失败', e.message);
        }
    }

    async function loadApiConfig() {
        try {
            const res = await fetch('/api/user/apis', { credentials: 'include' });
            const apis = await res.json();
            if (apis.length > 0) {
                apiConfig = apis[0];
                document.getElementById('apiName').value = apiConfig.name;
                document.getElementById('apiUrl').value = apiConfig.api_url;
                document.getElementById('apiKey').value = apiConfig.api_key;
                document.getElementById('apiModel').value = apiConfig.model;
                log('success', '已加载API配置', apiConfig.name);
            }
        } catch (e) {
            log('error', '加载配置失败');
        }
    }

    function navigate(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(`page-${page}`).classList.remove('hidden');
        document.getElementById('pageTitle').textContent = 
            page === 'text2img' ? '文生图' : 
            page === 'img2img' ? '图生图' : 'API设置';
    }

    // 文生图（关键修复：详细错误处理）
    async function generateText2Img() {
        const prompt = document.getElementById('t2iPrompt').value.trim();
        const btn = document.getElementById('t2iBtn');
        const result = document.getElementById('t2iResult');
        
        if (!prompt) return alert('请输入提示词');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
        result.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--primary);"></i>';
        
        log('info', '开始文生图请求', { prompt });
        
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ prompt, size: '1024x1024' })
            });
            
            const data = await res.json();
            log('info', '收到响应', { status: res.status, success: data.success });
            
            if (!res.ok || !data.success) {
                throw new Error(data.error || '生成失败');
            }
            
            result.innerHTML = `
                <img src="${data.image_url}" class="result-image" style="max-height: 100%;">
                <a href="${data.image_url}" target="_blank" style="margin-top: 12px; color: var(--primary);">
                    <i class="fas fa-external-link-alt"></i> 查看原图
                </a>
            `;
            log('success', '文生图成功', { image_url: data.image_url.substring(0, 50) });
            
        } catch (error) {
            result.innerHTML = `
                <div class="error-box">
                    <strong><i class="fas fa-exclamation-triangle"></i> 生成失败</strong>
                    <p>${error.message}</p>
                    <p style="margin-top: 8px; font-size: 12px; opacity: 0.8;">
                        建议检查：<br>
                        1. API配置是否正确<br>
                        2. API Key是否有效<br>
                        3. 账户余额是否充足<br>
                        4. 模型名称是否正确（dall-e-3 或 dall-e-2）
                    </p>
                </div>
            `;
            log('error', '文生图失败', error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic"></i> 生成图像';
        }
    }

    // 图生图文件处理
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        currentImage = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('imgPreview').innerHTML = `
                <img src="${e.target.result}" style="max-width: 100%; border-radius: 8px; border: 1px solid var(--border-glass);">
                <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                    ${file.name} (${(file.size/1024).toFixed(1)} KB)
                </div>
            `;
            document.getElementById('imgBtn').disabled = false;
            log('info', '图片已加载', { name: file.name, size: file.size, type: file.type });
        };
        reader.readAsDataURL(file);
    }

    // 图生图（关键修复）
    async function generateImg2Img() {
        if (!currentImage) return alert('请先上传图片');
        
        const prompt = document.getElementById('imgPrompt').value;
        const btn = document.getElementById('imgBtn');
        const result = document.getElementById('imgResult');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 转换中...';
        result.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--primary);"></i><p style="margin-top: 12px; color: var(--text-secondary);">正在上传并处理...</p>';
        
        log('info', '开始图生图请求', { prompt, imageSize: currentImage.size });
        
        try {
            const formData = new FormData();
            formData.append('image', currentImage);
            formData.append('prompt', prompt);
            formData.append('size', '1024x1024');
            
            // 关键：不要手动设置Content-Type，让浏览器自动设置boundary
            const res = await fetch('/api/img2img', {
                method: 'POST',
                credentials: 'include',
                body: formData
            });
            
            const data = await res.json();
            log('info', '收到响应', { status: res.status, success: data.success });
            
            if (!res.ok || !data.success) {
                throw new Error(data.error || data.detail || '转换失败');
            }
            
            result.innerHTML = `
                <img src="${data.image_url}" class="result-image" style="max-height: 100%;">
                <div style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);">
                    使用端点: ${data.endpoint || 'unknown'}
                </div>
            `;
            log('success', '图生图成功', { endpoint: data.endpoint });
            
        } catch (error) {
            result.innerHTML = `
                <div class="error-box">
                    <strong><i class="fas fa-exclamation-triangle"></i> 转换失败</strong>
                    <p>${error.message}</p>
                    <pre>${error.stack || ''}</pre>
                    <p style="margin-top: 8px; font-size: 12px;">
                        图生图常见问题：<br>
                        1. 该API可能不支持图生图功能<br>
                        2. 图片格式不被支持（尝试用JPG/PNG）<br>
                        3. 图片过大（建议小于5MB）<br>
                        4. 需要使用特定的模型（如dall-e-2）
                    </p>
                </div>
            `;
            log('error', '图生图失败', error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic"></i> 开始转换';
        }
    }

    // 测试连接（关键调试功能）
    async function testConnection() {
        const url = document.getElementById('apiUrl').value;
        const key = document.getElementById('apiKey').value;
        const model = document.getElementById('apiModel').value;
        const resultDiv = document.getElementById('testResult');
        
        if (!url || !key) {
            alert('请填写URL和Key');
            return;
        }
        
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 测试中...';
        log('info', '测试API连接', { url, model });
        
        try {
            const res = await fetch('/api/test-connection', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ api_url: url, api_key: key, model })
            });
            
            const data = await res.json();
            log('info', '测试结果', data);
            
            if (data.status === 200) {
                resultDiv.innerHTML = `<div style="color: var(--success);"><i class="fas fa-check-circle"></i> 连接成功！API工作正常</div>`;
            } else {
                resultDiv.innerHTML = `
                    <div style="color: var(--danger);">
                        <i class="fas fa-times-circle"></i> 连接失败 (状态码: ${data.status})<br>
                        <pre style="margin-top: 8px; font-size: 11px;">${JSON.stringify(data.data, null, 2)}</pre>
                    </div>
                `;
            }
        } catch (e) {
            resultDiv.innerHTML = `<div style="color: var(--danger);">测试出错: ${e.message}</div>`;
            log('error', '测试失败', e.message);
        }
    }

    // 保存API
    async function saveApi() {
        const data = {
            name: document.getElementById('apiName').value,
            api_url: document.getElementById('apiUrl').value,
            api_key: document.getElementById('apiKey').value,
            model: document.getElementById('apiModel').value
        };
        
        try {
            const res = await fetch('/api/user/apis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                alert('保存成功');
                log('success', 'API配置已保存');
            } else {
                alert('保存失败');
            }
        } catch (e) {
            log('error', '保存失败', e.message);
        }
    }

    async function logout() {
        await fetch('/api/logout', { credentials: 'include' });
        window.location.reload();
    }

    // 初始化
    init();
    </script>
</body>
</html>
