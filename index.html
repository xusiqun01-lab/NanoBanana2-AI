<!-- 设置页面 -->
<div id="page-settings" class="hidden">
    <div class="panel settings-form">
        <div class="panel-title">API 配置</div>
        
        <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-...">
            <div class="help-text">
                从 <a href="https://wish.sillydream.top/console/token" target="_blank" style="color: #f5a623;">这里获取/查看你的 API Key</a><br>
                （登录后直接复制 sk- 开头的 Key）
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">模型名称（必填）</label>
            <input type="text" id="modelInput" class="form-input" value="「Rim」gemini-3-pro-image-preview">
            <div class="help-text">
                推荐：香蕉2 「Rim」gemini-3-pro-image-preview（2K，白图率最低）
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">当前线路</label>
            <div class="form-input" style="background: #0f0f0f; border-color: #333;">
                官方稳定线路（https://f.sillydream.top）
            </div>
            <div class="help-text">
                自动使用官方统一网关，已支持图生图 + Gemini 模型<br>
                旧IP已失效，无需再填
            </div>
        </div>
        
        <button class="btn-primary" onclick="saveConfig()">保存配置</button>
        
        <div id="configStatus" style="margin-top: 15px; padding: 10px; border-radius: 6px; display: none;"></div>
    </div>
</div>
